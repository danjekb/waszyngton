name: Build Kernel A52s 5G (KSU-Next)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Cache toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: toolchains
          key: ${{ runner.os }}-clang-r530567-a52s

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc cpio curl wget git zip unzip zstd \
            libssl-dev bison flex ccache python3 lld device-tree-compiler \
            android-sdk-libsparse-utils jq lz4 abootimg
          ccache -M 10G

      - name: Build mkbootimg
        run: |
          git clone https://github.com/osm0sis/mkbootimg.git /tmp/mkbootimg
          cd /tmp/mkbootimg
          find . -name Makefile -exec sed -i 's/-Werror//g' {} \;
          make
          sudo cp mkbootimg /usr/local/bin/
          sudo chmod +x /usr/local/bin/mkbootimg

      - name: Download magiskboot
        run: |
          sudo wget -O /usr/local/bin/magiskboot "https://github.com/danjekb/magiskbinary/releases/download/magiskboot-30.7/magiskboot-x86_64"
          sudo chmod +x /usr/local/bin/magiskboot

      - name: Get stock images from RisenID
        run: |
          wget -O stock_kernel.tar "https://github.com/RisenID/proprietary_vendor_samsung_a52sxq/releases/download/A528BXXUAGXK8_BTU/A528BXXUAGXK8_kernel.tar"
          tar -xvf stock_kernel.tar
          lz4 -d boot.img.lz4 boot.img
          lz4 -d vendor_boot.img.lz4 vendor_boot.img
          lz4 -d dtbo.img.lz4 dtbo.img
          mkdir -p template-zip-file/images
          cp boot.img template-zip-file/images/
          cp vendor_boot.img template-zip-file/images/
          cp dtbo.img template-zip-file/images/

      - name: Download avbtool and erase footer
        run: |
          wget -q https://raw.githubusercontent.com/jbeich/platform_external_avb/refs/heads/master/avbtool.py
          chmod +x avbtool.py
          python3 avbtool.py erase_footer --image template-zip-file/images/boot.img 2>/dev/null || true
          python3 avbtool.py erase_footer --image template-zip-file/images/vendor_boot.img 2>/dev/null || true

      - name: Setup toolchain
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/clang
          wget -qO clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz"
          tar -xzf clang.tar.gz -C toolchains/clang

      - name: Patch defconfig for KSU-Next
        run: |
          DEFCONFIG=arch/arm64/configs/vendor/a52sxq_kor_single_defconfig
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' $DEFCONFIG
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-CrappyKernel"/' $DEFCONFIG
          for opt in \
            "CONFIG_COMPAT_VDSO=y" \
            "CONFIG_SHADOW_CALL_STACK_VMAP=y" \
            "CONFIG_LTO_CLANG_THIN=y" \
            "CONFIG_RELR=y" \
            "CONFIG_THINLTO=y" \
            "CONFIG_SHADOW_CALL_STACK=y"; do
            grep -qxF "$opt" $DEFCONFIG || echo "$opt" >> $DEFCONFIG
          done

      - name: Build kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          mkdir -p out
          make O=$(pwd)/out ARCH=arm64 vendor/a52sxq_kor_single_defconfig
          make O=$(pwd)/out ARCH=arm64 olddefconfig
          make -j$(nproc) \
            O=$(pwd)/out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-none-linux-gnu- \
            KBUILD_BUILD_USER=github \
            KBUILD_BUILD_HOST=actions

      - name: Collect modules
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          mkdir -p out/modules_for_zip
          find out -type f -name "*.ko" -exec cp {} out/modules_for_zip/ \;
          find out/modules_for_zip -type f -name "*.ko" -exec llvm-strip --strip-unneeded {} \;

      - name: Generate module metadata
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          MODULES_DIR="out/modules_for_zip"
          KERNEL_VER="5.4.289"
          if [ ! -f "out/System.map" ]; then
            echo "Błąd: Brak out/System.map"
            exit 1
          fi
          mkdir -p tmp/lib/modules/$KERNEL_VER
          cp $MODULES_DIR/*.ko tmp/lib/modules/$KERNEL_VER/
          sudo depmod -b tmp -F out/System.map $KERNEL_VER 2>/dev/null || true
          cp tmp/lib/modules/$KERNEL_VER/modules.* $MODULES_DIR/ 2>/dev/null || true
          sed -i 's|/tmp/lib/modules/|/lib/modules/|g' $MODULES_DIR/modules.dep 2>/dev/null || true
          ls $MODULES_DIR/*.ko | xargs -n1 basename | sed 's/.ko$//' > $MODULES_DIR/modules.load 2>/dev/null || true

      - name: Extract ramdisk from stock boot.img
        run: |
          cp template-zip-file/images/boot.img boot.img
          abootimg -x boot.img
          if [ ! -f initrd.img ]; then
            echo "Nie udało się wyciągnąć ramdisk"
            exit 1
          fi
          CMDLINE=$(abootimg --info boot.img | grep "cmdline" | cut -d: -f2- | xargs)
          echo "CMDLINE=$CMDLINE" >> $GITHUB_ENV

      - name: Create new boot.img with mkbootimg
        run: |
          mkbootimg \
            --kernel out/arch/arm64/boot/Image \
            --ramdisk initrd.img \
            --base 0x00000000 \
            --kernel_offset 0x00008000 \
            --ramdisk_offset 0x02000000 \
            --tags_offset 0x01e00000 \
            --pagesize 4096 \
            --cmdline "$CMDLINE" \
            --os_version 14.0.0 \
            --os_patch_level 2025-02 \
            --header_version 3 \
            --output boot.img
          cp boot.img template-zip-file/images/boot.img

      - name: Patch vendor_boot.img (using magiskboot, timeout 2 min)
        timeout-minutes: 2
        continue-on-error: true
        run: |
          cp template-zip-file/images/vendor_boot.img vendor_boot.img
          python3 avbtool.py erase_footer --image vendor_boot.img 2>/dev/null || true
          magiskboot unpack vendor_boot.img
          cp out/arch/arm64/boot/dts/vendor/qcom/yupik.dtb dtb
          if [ -d ramdisk ]; then
            rm -rf ramdisk
          fi
          mkdir ramdisk
          cd ramdisk
          cpio -idm < ../ramdisk.cpio
          rm -rf lib/modules/*
          mkdir -p lib/modules/5.4.289
          cp ../../out/modules_for_zip/*.ko lib/modules/5.4.289/ 2>/dev/null || true
          cp ../../out/modules_for_zip/modules.* lib/modules/5.4.289/ 2>/dev/null || true
          chown -R root:root .
          find . -type d -exec chmod 755 {} \;
          find . -type f -exec chmod 644 {} \;
          find . -print0 | cpio --null -o -H newc --owner root:root > ../ramdisk.cpio.new
          cd ..
          mv ramdisk.cpio.new ramdisk.cpio
          rm -rf ramdisk
          magiskboot repack vendor_boot.img
          mv new-boot.img vendor_boot.img
          cp vendor_boot.img template-zip-file/images/vendor_boot.img

      - name: Copy dtbo.img
        run: |
          cp out/arch/arm64/boot/dtbo.img template-zip-file/images/

      - name: Create flashable ZIP
        run: |
          cd template-zip-file
          rm -rf example-modules
          zip -r -9 ../CrappyKernel-$(date +%Y%m%d-%H%M%S).zip META-INF/ images/
          cd ..

      - name: Upload to GoFile
        run: |
          ZIP_FILE=$(ls CrappyKernel-*.zip | head -1)
          RESPONSE=$(curl -s -F "file=@$ZIP_FILE" "https://store1.gofile.io/contents/uploadfile")
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.downloadPage')
          if [ "$DOWNLOAD_URL" != "null" ] && [ -n "$DOWNLOAD_URL" ]; then
            echo "✅ Upload successful! Link: $DOWNLOAD_URL"
          else
            echo "❌ Upload failed. Response: $RESPONSE"
            exit 1
          fi
