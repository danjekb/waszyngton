name: Build Kernel A52s 5G (KSU-Next, Android 14)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-kernel-ccache
          restore-keys: |
            ${{ runner.os }}-kernel-ccache-

      - name: Cache Toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: toolchains
          key: ${{ runner.os }}-clang-r530567-a52s

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc cpio curl wget git zip unzip zstd \
            libssl-dev bison flex ccache python3 lld device-tree-compiler \
            android-sdk-libsparse-utils python3-pip
          pip3 install --break-system-packages mkbootimg || pip3 install mkbootimg
          ccache -M 10G

      - name: Download Toolchain
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchains/clang
          wget -qO clang.tar.gz \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r530567.tar.gz"
          tar -xzf clang.tar.gz -C toolchains/clang

      - name: Verify Toolchain
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          clang --version
          ld.lld --version

      - name: Patch defconfig for KernelSU Next
        run: |
          DEFCONFIG=arch/arm64/configs/vendor/a52sxq_kor_single_defconfig
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' $DEFCONFIG
          for opt in \
            "CONFIG_COMPAT_VDSO=y" \
            "CONFIG_SHADOW_CALL_STACK_VMAP=y" \
            "CONFIG_LTO_CLANG_THIN=y" \
            "CONFIG_RELR=y" \
            "CONFIG_THINLTO=y" \
            "CONFIG_SHADOW_CALL_STACK=y"; do
            grep -qxF "$opt" $DEFCONFIG || echo "$opt" >> $DEFCONFIG
          done

      - name: Build Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          mkdir -p out
          make O=$(pwd)/out ARCH=arm64 vendor/a52sxq_kor_single_defconfig
          make O=$(pwd)/out ARCH=arm64 olddefconfig
          make -j$(nproc) \
            O=$(pwd)/out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-none-linux-gnu- \
            KBUILD_BUILD_USER=github \
            KBUILD_BUILD_HOST=actions

      - name: Prepare modules
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchains/clang/bin:$PATH"
          mkdir -p out/modules_for_zip
          find out -type f -name "*.ko" -exec cp {} out/modules_for_zip/ \;
          find out/modules_for_zip -type f -name "*.ko" -exec llvm-strip --strip-unneeded {} \;

      - name: Create dtb.img
        run: |
          mkdir -p out/arch/arm64/boot
          mkdtimg create out/arch/arm64/boot/dtb.img \
            out/arch/arm64/boot/dts/vendor/qcom/*.dtb

      - name: Create vendor_boot.img
        run: |
          KERNEL_IMAGE="out/arch/arm64/boot/Image"
          DTB_FILE="out/arch/arm64/boot/dts/vendor/qcom/yupik.dtb"
          if [ ! -f "$KERNEL_IMAGE" ] || [ ! -f "$DTB_FILE" ]; then
            echo "Błąd: Brak Image lub yupik.dtb"
            exit 1
          fi
          mkdir -p out/vendor_boot
          mkbootimg \
            --kernel "$KERNEL_IMAGE" \
            --dtb "$DTB_FILE" \
            --base 0x00000000 \
            --kernel_offset 0x00008000 \
            --ramdisk_offset 0x02000000 \
            --tags_offset 0x01e00000 \
            --pagesize 4096 \
            --os_version 14.0.0 \
            --os_patch_level 2025-02 \
            --header_version 3 \
            --output out/vendor_boot/vendor_boot.img

      - name: Prepare AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git anykernel3
          cd anykernel3
          rm -rf .git
          cp ../out/arch/arm64/boot/Image .
          cp ../out/arch/arm64/boot/dtbo.img .
          cp ../out/arch/arm64/boot/dtb.img .
          cp ../out/vendor_boot/vendor_boot.img .
          mkdir -p modules/system/lib/modules
          if [ -d ../out/modules_for_zip ]; then
            cp ../out/modules_for_zip/*.ko modules/system/lib/modules/ 2>/dev/null || true
          fi
          printf '%s\n' \
            '## AnyKernel3 – Samsung A52s 5G (Android 14, KSU-Next)' \
            'kernel.string=Kernel A52s for KSU-Next (Android 14)' \
            'do.devicecheck=1' \
            'do.modules=1' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=a52sxq' \
            'device.name2=a52s' \
            'supported.versions=14' \
            'supported.patchlevels=2023-01 - 2025-12' \
            'block=boot' \
            'vendor_block=vendor_boot' \
            'is_slot_device=auto' \
            'ramdisk_compression=auto' \
            'patch_vbmeta_flag=auto' > anykernel.sh
          zip -r9 ../Kernel-A52s-KSU-Next-Android14-$(date +%Y%m%d-%H%M%S).zip * -x "*.git*"

      - name: Upload flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-A52s-KSU-Next-Android14
          path: Kernel-A52s-KSU-Next-Android14-*.zip

      - name: Upload raw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Artifacts-raw
          path: |
            out/arch/arm64/boot/Image
            out/arch/arm64/boot/dtbo.img
            out/arch/arm64/boot/dtb.img
            out/vendor_boot/vendor_boot.img
            out/modules_for_zip/
